<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class ="game-container">
        <h1>Змейка</h1>
        <div class="score-board">Длина змейки: <span id="score">3</span></div>
        <div class="game-controls">
            <button id="start-btn">Start</button>
            <button id="pause-btn" disabled>Pause</button>
        </div>
        <!-- Здесь JS нарисует игровое поле -->
        <div id="game-field" class="grid"></div>
        <div class="controls-hint">Управление стрелочками на клавиатуре или кнопками WASD на клавиатуре</div>
        <script src="script.js"></script>
    </div>
</body>
</html>
